<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.png">
<title>Поступления USDCASH  на 4store.pcash</title>
<style>
    :root {
        --bg: #0f1115; --panel: #171a21; --border: #262b35;
        --text: #e6e8eb; --muted: #8a8f98;
        --accent: #4fd1c5; --accent2: #f6ad55; --danger: #f66464;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 32px 16px; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; min-width: 150px; }
    .stat-card .num { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-card .num.warn { color: var(--accent2); }
    .stat-card .num.price { color: #b794f4; }
    .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
    th, td { padding: 10px 14px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; background: #1b1f28; }
    tr:last-child td { border-bottom: none; }
    .idx { color: var(--muted); font-family: ui-monospace, monospace; width: 48px; text-align: right; white-space: nowrap; }
    .ts { white-space: nowrap; font-size: 12px; }
    .section-title { font-size: 15px; margin: 16px 0 10px; color: var(--text); }
    .section-count { color: var(--muted); font-size: 12px; font-weight: 400; }
    .addr { font-family: ui-monospace, monospace; }
    .amount { font-weight: 600; color: var(--accent); white-space: nowrap; }
    .price-cell { font-family: ui-monospace, monospace; font-size: 12px; white-space: nowrap; }
    .memo { color: var(--muted); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tx-cell code { color: var(--muted); font-size: 11px; }
    .badge { display: inline-block; background: var(--accent2); color: #1a1a1a; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
    tr.suspicious td { background: rgba(246, 100, 100, 0.07); }
    tr.suspicious .amount { color: var(--accent2); }
    tr.suspicious .idx { color: var(--danger); }
    .susp-legend { font-size: 12px; color: var(--muted); margin-bottom: 20px; padding: 10px 14px; background: rgba(246, 100, 100, 0.07); border-left: 3px solid var(--accent2); border-radius: 4px; line-height: 1.7; }
    .susp-legend strong { color: var(--accent2); }
    .remainder { text-align: center; color: var(--muted); font-size: 13px; padding: 14px; border: 1px dashed var(--border); border-radius: 10px; margin-bottom: 28px; }
    .remainder strong { color: var(--text); }
    .empty-row td { text-align: center; color: var(--muted); padding: 30px 0; }
    .error-box { background: #3a1f1f; border: 1px solid #6b2c2c; color: #ffb3b3; padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
    .footer { margin-top: 20px; color: var(--muted); font-size: 12px; line-height: 1.8; }
    .loading { text-align: center; color: var(--muted); padding: 60px 0; font-size: 15px; }
    .refresh-badge { display: inline-block; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 11px; color: var(--muted); margin-left: 12px; vertical-align: middle; }
</style>
</head>
<body>
<div class="wrap">
    <div id="root"><div class="loading">⏳ Загрузка данных…</div></div>
</div>

<script>
// URL сырого JSON в GitHub — замени на свой репозиторий!
// Формат: https://raw.githubusercontent.com/ЛОГИН/РЕПО/main/public/data.json
const DATA_URL = "https://raw.githubusercontent.com/cworq/pcash-monitor/main/public/data.json";

const REFRESH_MS = 15 * 60 * 1000; // 15 минут

function esc(s) {
    return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

function priceCell(expected, diff, threshold) {
    if (expected === null || expected === undefined || diff === null || diff === undefined) {
        return '<span style="color:var(--muted)">н/д</span>';
    }
    const sign = diff > 0 ? "+" : "";
    let color = "var(--accent)";
    if (diff > threshold) color = "var(--danger)";
    else if (diff > 0) color = "var(--accent2)";
    return `<span style="color:var(--muted)">${expected.toFixed(3)}</span>&nbsp;<span style="color:${color};font-size:11px;font-weight:600">(${sign}${diff.toFixed(3)})</span>`;
}

function renderTable(rows, emptyMsg) {
    if (!rows || rows.length === 0) {
        return `<tr class="empty-row"><td colspan="7">${emptyMsg}</td></tr>`;
    }
    return rows.map((r, i) => {
        const dupBadge = r.seq_for_address > 1
            ? `<span class="badge">#${r.seq_for_address}</span>`
            : "";
        const suspClass = r.suspicious ? ' class="suspicious"' : "";
        const suspIcon = r.suspicious ? " ⚠️" : "";
        return `
        <tr${suspClass}>
            <td class="idx">${i + 1}${suspIcon}</td>
            <td class="ts">${esc(r.timestamp)}</td>
            <td class="addr">${esc(r.from)} ${dupBadge}</td>
            <td class="amount">${r.amount.toFixed(4)} ${esc(r.symbol)}</td>
            <td class="price-cell">${priceCell(r.expected_price, r.price_diff, THRESHOLD)}</td>
            <td class="memo">${esc(r.memo)}</td>
            <td class="tx-cell"><code>${esc((r.trx_id || "").substring(0, 12))}…</code></td>
        </tr>`;
    }).join("");
}

let THRESHOLD = 0.5;

function render(data) {
    THRESHOLD = data.suspicious_threshold || 0.5;
    const rows = data.rows || [];
    const top = data.top_group_size || 24;
    const second = data.second_group_size || 96;
    const captains = rows.slice(0, top);
    const members = rows.slice(top, top + second);
    const remainder = data.remainder_count || 0;

    const errorBox = data.error
        ? `<div class="error-box">⚠️ Не удалось получить данные.<br>${esc(data.error)}</div>`
        : "";

    const suspLegend = data.suspicious_count > 0 ? `
        <div class="susp-legend">
            ⚠️ <strong>${data.suspicious_count} подозрительных</strong> — сумма взноса превышает
            расчётную цену редукциона более чем на $${THRESHOLD.toFixed(1)}.
            Колонка «Ожид. (откл.)»:
            <span style="color:var(--accent)">зелёный</span> = ниже нормы,
            <span style="color:var(--accent2)">оранжевый</span> = чуть выше,
            <span style="color:var(--danger)">красный</span> = подозрительно.
        </div>` : "";

    const remainderHtml = remainder > 0
        ? `<div class="remainder">И ещё <strong>${remainder}</strong> записей не вошли в таблицы</div>`
        : "";

    const nowPrice = data.current_auction_price != null
        ? `$${data.current_auction_price.toFixed(3)}`
        : "н/д";

    document.getElementById("root").innerHTML = `
        <h1>Поступления USDCASH на 4store.pcash
            <span class="refresh-badge" id="countdown">обновление через 15:00</span>
        </h1>
        <div class="subtitle">
            Период: ${esc(data.period_start)} — ${esc(data.period_end)} ·
            Сформировано: ${esc(data.generated_at)}
        </div>
        ${errorBox}
        <div class="stats">
            <div class="stat-card"><div class="num">${rows.length}</div><div class="label">Показано записей</div></div>
            <div class="stat-card"><div class="num">${data.unique_addresses || 0}</div><div class="label">Уникальных адресов</div></div>
            <div class="stat-card"><div class="num">${data.total_raw_count || 0}</div><div class="label">Всего найдено</div></div>
            <div class="stat-card"><div class="num warn">${data.suspicious_count || 0}</div><div class="label">⚠️ Подозрительных</div></div>
            <div class="stat-card"><div class="num price">${nowPrice}</div><div class="label">Цена редукциона</div></div>
        </div>
        ${suspLegend}
        <h2 class="section-title">🥇 Капитаны <span class="section-count">(топ ${top} по сумме)</span></h2>
        <table>
            <thead><tr>
                <th class="idx">#</th><th>Время (UTC+5)</th><th>Отправитель</th>
                <th>Сумма</th><th>Ожид. (откл.)</th><th>Memo</th><th>TX</th>
            </tr></thead>
            <tbody>${renderTable(captains, "Поступлений в этой группе нет.")}</tbody>
        </table>
        <h2 class="section-title">🥈 Участники <span class="section-count">(следующие ${second} по сумме)</span></h2>
        <table>
            <thead><tr>
                <th class="idx">#</th><th>Время (UTC+5)</th><th>Отправитель</th>
                <th>Сумма</th><th>Ожид. (откл.)</th><th>Memo</th><th>TX</th>
            </tr></thead>
            <tbody>${renderTable(members, "Поступлений в этой группе нет.")}</tbody>
        </table>
        ${remainderHtml}
        <div class="footer">
            Источник данных: ${esc(data.endpoint)} · JSON обновляется через GitHub Actions каждые 15 минут
        </div>
    `;
}

let secondsLeft = REFRESH_MS / 1000;

function updateCountdown() {
    const el = document.getElementById("countdown");
    if (!el) return;
    const m = Math.floor(secondsLeft / 60).toString().padStart(2, "0");
    const s = (secondsLeft % 60).toString().padStart(2, "0");
    el.textContent = `обновление через ${m}:${s}`;
    secondsLeft--;
    if (secondsLeft < 0) secondsLeft = REFRESH_MS / 1000;
}

async function loadData() {
    try {
        // cache-bust чтобы браузер не кешировал старый JSON
        const url = DATA_URL + "?t=" + Date.now();
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        render(data);
        secondsLeft = REFRESH_MS / 1000;
    } catch (e) {
        const root = document.getElementById("root");
        if (root) root.innerHTML = `<div class="error-box">⚠️ Не удалось загрузить данные: ${esc(e.message)}<br>Следующая попытка через 15 минут.</div>`;
    }
}

// Первая загрузка
loadData();

// Обновление каждые 15 минут
setInterval(loadData, REFRESH_MS);

// Таймер обратного отсчёта каждую секунду
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
